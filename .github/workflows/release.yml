name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and attach zip to (e.g. v0.2.0)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve tag and version
        run: |
          TAG=${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          echo "TAG=$TAG" >> $GITHUB_ENV
          echo "VERSION=${TAG#v}" >> $GITHUB_ENV

      - name: Update module.json
        run: |
          jq --arg version "$VERSION" \
             --arg download "https://github.com/kamcknig/pick-up-stix/releases/download/$TAG/module.zip" \
             '.version = $version | .download = $download' \
             module.json > module.tmp.json && mv module.tmp.json module.json

      - name: Build module zip
        run: zip -r module.zip module.json README.md icons/ lang/ scripts/ styles/ templates/

      - name: Attach zip to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" module.zip --clobber
          else
            gh release create "$TAG" module.zip \
              --title "$TAG" \
              --generate-notes
          fi

      - name: Commit updated module.json to source branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # A tag-push event carries no branch name, so resolve the branch the tag was
          # created on from git. --points-at matches only branches whose TIP is exactly the
          # tagged commit (precise); --contains would also match every ancestor branch
          # (e.g. develop, when a release/* branch was cut from it) and head -1 would pick
          # the wrong one alphabetically. When more than one branch shares the tagged tip,
          # prefer a release/* branch, since releases are cut from those.
          POINTS=$(git branch -r --points-at "$TAG" | grep -v HEAD | sed 's|origin/||' | xargs -n1)
          SOURCE_BRANCH=$(echo "$POINTS" | grep '^release/' | head -1)
          [ -z "$SOURCE_BRANCH" ] && SOURCE_BRANCH=$(echo "$POINTS" | head -1)
          [ -z "$SOURCE_BRANCH" ] && SOURCE_BRANCH="master"
          echo "Resolved source branch: $SOURCE_BRANCH"
          cp module.json /tmp/module.json
          git checkout "$SOURCE_BRANCH"
          cp /tmp/module.json module.json
          git add module.json
          git diff --cached --quiet || git commit -m "chore: update module.json to $VERSION"
          git push origin "$SOURCE_BRANCH"
          git tag -f "$TAG" HEAD
          git push origin "refs/tags/$TAG" --force
