<?xml version="1.0" encoding="utf-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="bg" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#141426"/>
    <stop offset="100%" stop-color="#04040a"/>
  </radialGradient>
  <radialGradient id="aura" cx="45%" cy="40%" r="55%">
    <stop offset="0%" stop-color="#30c8e0" stop-opacity="0.45"/>
    <stop offset="60%" stop-color="#18a0c0" stop-opacity="0.15"/>
    <stop offset="100%" stop-color="#18a0c0" stop-opacity="0"/>
  </radialGradient>
  <radialGradient id="innerGlow" cx="38%" cy="30%" r="60%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
    <stop offset="100%" stop-color="#40b8d8" stop-opacity="0"/>
  </radialGradient>
  <linearGradient id="goldV" x1="0%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#f2d468"/>
    <stop offset="45%" stop-color="#c08010"/>
    <stop offset="100%" stop-color="#6e3a00"/>
  </linearGradient>
  <linearGradient id="goldH" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#6e3a00"/>
    <stop offset="30%" stop-color="#dca030"/>
    <stop offset="55%" stop-color="#f2d468"/>
    <stop offset="80%" stop-color="#dca030"/>
    <stop offset="100%" stop-color="#6e3a00"/>
  </linearGradient>
  <linearGradient id="fTL" x1="100%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#78c8e8"/>
    <stop offset="100%" stop-color="#1878a8"/>
  </linearGradient>
  <linearGradient id="fTR" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#d0f0ff"/>
    <stop offset="100%" stop-color="#50a8d0"/>
  </linearGradient>
  <linearGradient id="fBL" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#105878"/>
    <stop offset="100%" stop-color="#062030"/>
  </linearGradient>
  <linearGradient id="fBR" x1="100%" y1="0%" x2="0%" y2="100%">
    <stop offset="0%" stop-color="#2080b0"/>
    <stop offset="100%" stop-color="#0a3050"/>
  </linearGradient>
</defs>

<!-- Background -->
<circle cx="128" cy="128" r="128" fill="url(#bg)"/>

<!-- Outer ring double border -->
<circle cx="128" cy="128" r="118" fill="none" stroke="#c8a028" stroke-width="1.5" opacity="0.65"/>
<circle cx="128" cy="128" r="114" fill="none" stroke="#805800" stroke-width="0.5" opacity="0.4"/>

<!-- 8 diamond ornamental ticks on outer ring -->
<g fill="#c8a028" opacity="0.72">
  <polygon points="128,7 131,11 128,15 125,11" transform="rotate(0,128,128)"/>
  <polygon points="128,7 131,11 128,15 125,11" transform="rotate(45,128,128)"/>
  <polygon points="128,7 131,11 128,15 125,11" transform="rotate(90,128,128)"/>
  <polygon points="128,7 131,11 128,15 125,11" transform="rotate(135,128,128)"/>
  <polygon points="128,7 131,11 128,15 125,11" transform="rotate(180,128,128)"/>
  <polygon points="128,7 131,11 128,15 125,11" transform="rotate(225,128,128)"/>
  <polygon points="128,7 131,11 128,15 125,11" transform="rotate(270,128,128)"/>
  <polygon points="128,7 131,11 128,15 125,11" transform="rotate(315,128,128)"/>
</g>

<!-- Inner arcane circle -->
<circle cx="128" cy="128" r="88" fill="none" stroke="#c8a028" stroke-width="0.75" opacity="0.22"/>

<!-- 12 radial tick marks on arcane circle -->
<g stroke="#c8a028" stroke-width="1" opacity="0.28">
  <line x1="128" y1="37" x2="128" y2="44" transform="rotate(0,128,128)"/>
  <line x1="128" y1="37" x2="128" y2="44" transform="rotate(30,128,128)"/>
  <line x1="128" y1="37" x2="128" y2="44" transform="rotate(60,128,128)"/>
  <line x1="128" y1="37" x2="128" y2="44" transform="rotate(90,128,128)"/>
  <line x1="128" y1="37" x2="128" y2="44" transform="rotate(120,128,128)"/>
  <line x1="128" y1="37" x2="128" y2="44" transform="rotate(150,128,128)"/>
  <line x1="128" y1="37" x2="128" y2="44" transform="rotate(180,128,128)"/>
  <line x1="128" y1="37" x2="128" y2="44" transform="rotate(210,128,128)"/>
  <line x1="128" y1="37" x2="128" y2="44" transform="rotate(240,128,128)"/>
  <line x1="128" y1="37" x2="128" y2="44" transform="rotate(270,128,128)"/>
  <line x1="128" y1="37" x2="128" y2="44" transform="rotate(300,128,128)"/>
  <line x1="128" y1="37" x2="128" y2="44" transform="rotate(330,128,128)"/>
</g>

<!-- Gem aura glow -->
<ellipse cx="128" cy="115" rx="64" ry="60" fill="url(#aura)"/>

<!-- Gem — kite diamond: top(128,72) left(85,125) right(171,125) bottom(128,172) -->
<polygon points="128,72 85,125 128,125" fill="url(#fTL)"/>
<polygon points="128,72 171,125 128,125" fill="url(#fTR)"/>
<polygon points="128,125 85,125 128,172" fill="url(#fBL)"/>
<polygon points="128,125 171,125 128,172" fill="url(#fBR)"/>

<!-- Inner glow overlay on gem surface -->
<polygon points="128,72 171,125 128,172 85,125" fill="url(#innerGlow)"/>

<!-- Gem outline -->
<polygon points="128,72 171,125 128,172 85,125" fill="none" stroke="#90d8f0" stroke-width="1.5" opacity="0.75"/>

<!-- Facet division lines -->
<line x1="128" y1="72" x2="128" y2="172" stroke="#d8f4ff" stroke-width="0.5" opacity="0.4"/>
<line x1="85" y1="125" x2="171" y2="125" stroke="#d8f4ff" stroke-width="0.5" opacity="0.4"/>

<!-- Upper shine -->
<polygon points="128,72 163,113 128,97" fill="white" opacity="0.2"/>
<!-- Primary highlight dot -->
<circle cx="116" cy="94" r="4.5" fill="white" opacity="0.6"/>
<circle cx="116" cy="94" r="2" fill="white" opacity="0.92"/>

<!-- Pedestal top cap -->
<ellipse cx="128" cy="175" rx="13" ry="5" fill="url(#goldH)"/>
<!-- Column body -->
<rect x="121" y="175" width="14" height="21" fill="url(#goldV)"/>
<!-- Decorative mid-ring -->
<ellipse cx="128" cy="185" rx="16" ry="5.5" fill="url(#goldH)"/>
<!-- Base plate -->
<ellipse cx="128" cy="197" rx="28" ry="8" fill="url(#goldH)"/>
<!-- Base shadow lip -->
<ellipse cx="128" cy="202" rx="24" ry="5" fill="url(#goldV)" opacity="0.5"/>

<!-- Gold 4-point sparkle — top left -->
<polygon points="76,75 79.5,81 85,84 79.5,87 76,93 72.5,87 67,84 72.5,81" fill="#f0c840" opacity="0.85"/>
<!-- Gold 4-point sparkle — top right, smaller -->
<polygon points="180,67 182.5,72 187,74 182.5,76 180,81 177.5,76 173,74 177.5,72" fill="#f0c840" opacity="0.72"/>
<!-- Blue sparkle — left -->
<polygon points="62,128 64,133 69,135 64,137 62,142 60,137 55,135 60,133" fill="#80e0f8" opacity="0.55"/>
<!-- Blue sparkle — right -->
<polygon points="193,106 194.5,110 199,112 194.5,114 193,118 191.5,114 187,112 191.5,110" fill="#80e0f8" opacity="0.5"/>

<!-- Floating particles -->
<circle cx="94" cy="102" r="2" fill="#38c8e0" opacity="0.5"/>
<circle cx="163" cy="97" r="1.5" fill="#38c8e0" opacity="0.42"/>
<circle cx="80" cy="152" r="1.5" fill="#c8a028" opacity="0.45"/>
<circle cx="179" cy="148" r="1.2" fill="#c8a028" opacity="0.4"/>
<circle cx="108" cy="64" r="1.5" fill="#c0e8ff" opacity="0.35"/>
<circle cx="158" cy="58" r="1" fill="#c0e8ff" opacity="0.3"/>
<circle cx="170" cy="162" r="1.5" fill="#38c8e0" opacity="0.3"/>
<circle cx="87" cy="165" r="1" fill="#38c8e0" opacity="0.25"/>
</svg>
